name: Deploy Backend

on:
  push:
    branches:
      - main   

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}

          script: |
            cd /home/ubuntu/Email-Assistant/backend
            git pull origin main
            npm ci
            pm2 reload email-assistant || pm2 start app.js --name email-assistant